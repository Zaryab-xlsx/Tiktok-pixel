<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Celestella — Star-Dust Dreams</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,500&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<!--
  =========================================================
  DESIGN TOKENS (Celestella — Star-Dust Dreams)
  Colors pulled from brand creative:
    --plum        deep maroon/plum, footer bar + text
    --plum-2      lighter plum for gradient depth
    --cream       main peach/cream background
    --cream-light card surface, lighter cream
    --gold        line icons, accents
    --gold-soft   soft gold highlight (ring, glow)
  Type:
    Display  — Cormorant Garamond (italic accents), echoes the logo's
               elegant serif swash without copying it directly
    Body/UI  — Poppins, tracked uppercase for labels (matches the
               brand's badge-label treatment in the reference image)
  Signature element:
    A slow gold countdown ring around a small pulsing heart —
    a quiet nod to the brand's ✦ star-dust sparkle motif, and an
    honest UX signal (not a fake urgency timer) that something is
    about to happen.
  =========================================================
-->

<style>
  :root {
    --plum: #3B1330;
    --plum-2: #55193F;
    --cream: #F6DFC4;
    --cream-light: #FBF1DF;
    --gold: #B8873A;
    --gold-soft: #E3C68A;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
  }

  body {
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(120% 100% at 50% 0%, var(--cream) 0%, #F1D6B5 100%);
    color: var(--plum);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    overflow-x: hidden;
  }

  /* ambient sparkle dots, purely decorative, very quiet */
  .sparkle {
    position: absolute;
    color: var(--gold);
    opacity: 0.5;
    font-size: 14px;
    animation: twinkle 3.2s ease-in-out infinite;
  }
  .sparkle.s1 { top: 8%;  left: 10%; animation-delay: 0s; }
  .sparkle.s2 { top: 14%; right: 12%; animation-delay: 1.1s; font-size: 10px; }
  .sparkle.s3 { top: 46%; left: 6%;  animation-delay: 2s; font-size: 11px; }
  .sparkle.s4 { top: 52%; right: 8%; animation-delay: 0.6s; }

  @keyframes twinkle {
    0%, 100% { opacity: 0.25; transform: scale(0.85); }
    50%      { opacity: 0.8;  transform: scale(1.1); }
  }

  main {
    width: 100%;
    max-width: 420px;
    padding: 34px 26px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    position: relative;
  }

  .wordmark {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 600;
    font-size: 34px;
    letter-spacing: 0.5px;
    color: var(--plum);
  }

  .tagline {
    margin-top: 4px;
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
  }

  .headline {
    margin-top: 26px;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 28px;
    line-height: 1.25;
    color: var(--plum);
  }
  .headline em {
    font-style: italic;
    color: var(--plum-2);
  }

  .subline {
    margin-top: 10px;
    font-size: 13px;
    font-weight: 400;
    color: #6B4359;
    max-width: 300px;
  }

  /* badge row, echoes the arched icon badges in the brand creative */
  .badges {
    margin-top: 24px;
    display: flex;
    gap: 10px;
    width: 100%;
    justify-content: center;
  }
  .badge {
    flex: 1;
    max-width: 118px;
    background: var(--cream-light);
    border: 1px solid rgba(184,135,58,0.35);
    border-radius: 16px 16px 10px 10px;
    padding: 12px 6px 10px;
  }
  .badge svg { width: 22px; height: 22px; stroke: var(--gold); }
  .badge-label {
    display: block;
    margin-top: 6px;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    color: var(--plum);
  }

  /* countdown ring — the signature element */
  .redirect-block {
    margin-top: 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .ring-wrap {
    position: relative;
    width: 76px;
    height: 76px;
  }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-track { fill: none; stroke: rgba(184,135,58,0.22); stroke-width: 5; }
  .ring-progress {
    fill: none;
    stroke: var(--gold);
    stroke-width: 5;
    stroke-linecap: round;
    stroke-dasharray: 213;
    stroke-dashoffset: 213;
    animation: countdown 2s linear forwards;
  }
  @keyframes countdown {
    to { stroke-dashoffset: 0; }
  }
  .ring-heart {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.12); }
  }

  .redirect-text {
    margin-top: 12px;
    font-size: 12px;
    font-weight: 500;
    color: #6B4359;
  }
  .redirect-text span { color: var(--plum); font-weight: 600; }

  .cta-btn {
    margin-top: 18px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--plum);
    color: var(--cream-light);
    border: none;
    padding: 14px 28px;
    border-radius: 999px;
    font-family: 'Poppins', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.3px;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(59,19,48,0.25);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .cta-btn:active { transform: scale(0.97); }
  .cta-btn:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 3px;
  }

  footer {
    width: 100%;
    background: var(--plum);
    color: var(--gold-soft);
    text-align: center;
    padding: 12px 10px;
    font-size: 10.5px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 500;
  }

  @media (prefers-reduced-motion: reduce) {
    .ring-progress, .ring-heart, .sparkle { animation: none; }
    .ring-progress { stroke-dashoffset: 0; }
  }
</style>
</head>
<body>

<span class="sparkle s1">✦</span>
<span class="sparkle s2">✦</span>
<span class="sparkle s3">✦</span>
<span class="sparkle s4">✦</span>

<main>
  <div class="wordmark">celestella</div>
  <div class="tagline">✦ Star-Dust Dreams ✦</div>

  <h1 class="headline">Tarnish-Free.<br>Waterproof.<br><em>Yours, Always.</em></h1>
  <p class="subline">Stainless steel jewelry made for everyday magic — plus free delivery &amp; a mystery gift on every order.</p>

  <div class="badges">
    <div class="badge">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2l7 3v6c0 5-3.5 8.5-7 10-3.5-1.5-7-5-7-10V5l7-3z"/>
        <path d="M9.5 12l1.8 1.8L15 10"/>
      </svg>
      <span class="badge-label">Tarnish<br>Resistant</span>
    </div>
    <div class="badge">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3c3 4 6 7.2 6 10.5A6 6 0 1 1 6 13.5C6 10.2 9 7 12 3z"/>
      </svg>
      <span class="badge-label">Waterproof</span>
    </div>
    <div class="badge">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="8" width="12" height="8" rx="1.2"/>
        <path d="M14 11h4l3 3v2h-7z"/>
        <circle cx="6.5" cy="18" r="1.6"/>
        <circle cx="17" cy="18" r="1.6"/>
      </svg>
      <span class="badge-label">Free<br>Delivery</span>
    </div>
  </div>

  <div class="redirect-block">
    <div class="ring-wrap">
      <svg width="76" height="76" viewBox="0 0 76 76">
        <circle class="ring-track" cx="38" cy="38" r="34"></circle>
        <circle class="ring-progress" cx="38" cy="38" r="34"></circle>
      </svg>
      <div class="ring-heart">💬</div>
    </div>
    <p class="redirect-text">Opening <span>WhatsApp chat</span> for you…</p>

    <button class="cta-btn" id="chatBtn" type="button">
      Chat With Us Now →
    </button>
  </div>
</main>

<footer>✦ Minimal. Timeless. Celestella. ✦</footer>

<!-- =========================================================
     Redirect logic
     - Countdown ring runs for 2 seconds (matches the CSS animation).
     - After 2s, OR if the visitor taps the button early, we fire the
       "Contact" custom event ONCE, then send them to WhatsApp.
     - The small setTimeout before navigating gives the pixel request
       time to leave the browser before the page unloads.
     - fired flag prevents the event firing twice if the button is
       tapped during the auto-countdown.
     ========================================================= -->
<script>
  var WHATSAPP_URL = "https://wa.me/923099556319?text=Hi%20Celestella%21%20I%20came%20across%20your%20tarnish-free%20jewellery%20and%20I%27m%20interested%2C%20but%20I%20have%20one%20concern%20-%20does%20it%20actually%20stay%20scratch%20and%20tarnish%20free%20with%20daily%20wear%20like%20sweat%20and%20water%3F%20Also%20are%20you%20doing%20any%20discount%20like%20free%20delivery%20or%20mystery%20gift%3F";
  var fired = false;

  function goToWhatsApp() {
    if (fired) return;
    fired = true;

    // Fire the Contact event — this represents "opened the WhatsApp chat",
    // NOT a confirmed sale. Purchases are reported separately via
    // server-side Events API once an order is confirmed.
    if (window.ttq) {
      ttq.track('Contact', { content_name: 'Celestella WhatsApp Chat' });
    }

    setTimeout(function () {
      window.location.href = WHATSAPP_URL;
    }, 300);
  }

  document.getElementById('chatBtn').addEventListener('click', goToWhatsApp);

  // auto-redirect once the 2s countdown ring finishes
  setTimeout(goToWhatsApp, 2000);
</script>

</body>
</html>
